services:
    front:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - 8083:80
        networks:
            - finance-tracker

    back:
        build:
            context: ./backend
            dockerfile: Dockerfile
        expose:
            - 5000
        networks:
            - finance-tracker
        depends_on:
            - database

    database:
        image: postgres:17.4
        restart: always
        environment:
            # env file already in production environment
            POSTGRES_USER: ${pg-user}
            POSTGRES_PASSWORD: ${pg-password}
            POSTGRES_DB: ${pg-db}
        expose:
            - 5432
        networks:
            - finance-tracker
        volumes:
            - "postgres:/var/lib/postgresql/data"

networks:
    finance-tracker:
        driver: bridge

volumes:
    postgres: # create a volume to store the data of the database
